<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Frotasys</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="/icons/favicon-192.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f766e">
<link rel="stylesheet" href="css/style.css?v=20260602-cabecalho-fixo-posicionado">
</head>
<body class="login-page">
  <div class="mobile-blocker" aria-live="polite">
    <section class="mobile-blocker-card">
      <div class="mobile-blocker-mark">D</div>
      <h1>Acesso indisponível em dispositivos móveis</h1>
      <p>O Dashlog foi desenvolvido para uso em computador. Acesse por um notebook ou desktop.</p>
    </section>
  </div>

  <main class="login-shell">
    <section class="login-panel">
      <div class="login-brand">
        <img src="img/frotasys-logo.png" alt="Frotasys">
        <div>
          <h1>Frotasys</h1>
          <p>Controle operacional de viagens</p>
        </div>
      </div>

      <form class="login-card" id="login-form">
        <div>
          <h2>Entrar</h2>
          <p>Acesse com seu e-mail autorizado.</p>
        </div>
        <label>
          <span>E-mail</span>
          <input type="email" id="login-email" autocomplete="email" required>
        </label>
        <label>
          <span>Senha</span>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>
        <div class="login-error" id="login-error" role="alert"></div>
        <button type="submit" id="login-submit">Entrar</button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js?v=20260521-auth"></script>
  <script src="js/login.js?v=20260521-auth"></script>
</body>
</html>
